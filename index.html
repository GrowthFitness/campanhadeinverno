<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campanha de Inverno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: #141414;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 80px;
    }

    .headline {
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 900;
      color: #fff;
      text-align: center;
      line-height: 1.1;
      letter-spacing: -0.02em;
      max-width: 760px;
    }

    .subtitle {
      margin-top: 16px;
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      color: #888;
      text-align: center;
      max-width: 580px;
      line-height: 1.6;
    }

    .video-wrap {
      margin-top: 40px;
      width: 100%;
      max-width: 860px;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.7);
    }

    .video-wrap iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border: none;
    }

    /* CTA - oculto inicialmente */
    .cta-section {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;

      opacity: 0;
      transform: translateY(28px);
      pointer-events: none;
      transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .cta-section.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .price-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .price-old {
      font-size: clamp(1.2rem, 3vw, 1.7rem);
      font-weight: 700;
      color: #555;
      text-decoration: line-through;
      text-decoration-color: #555;
    }

    .price-new {
      font-size: clamp(2rem, 5.5vw, 3.2rem);
      font-weight: 900;
      color: #b8f500;
      letter-spacing: -0.02em;
    }

    .btn-cta {
      display: inline-block;
      background: #b8f500;
      color: #0a0a0a;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 18px 52px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.12s ease, box-shadow 0.18s ease;
      box-shadow: 0 4px 24px rgba(184, 245, 0, 0.25);
    }

    .btn-cta:hover {
      background: #cbff1a;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(184, 245, 0, 0.35);
    }

    .btn-cta:active {
      transform: translateY(0px);
    }

    @media (max-width: 480px) {
      .page {
        padding: 40px 16px 60px;
      }
      .btn-cta {
        padding: 16px 36px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <h1 class="headline">Campanha de Inverno</h1>
    <p class="subtitle">A melhor estratégia para matricular novos alunos no seu negócio fitness agora em julho.</p>

    <div class="video-wrap">
      <iframe
        id="panda-video"
        src="https://player-vz-d0abe256-8c2.tv.pandavideo.com/embed/?v=59ebcfcb-025a-4473-8a0c-a68b140c3a79"
        allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture"
        allowfullscreen
      ></iframe>
    </div>

    <div class="cta-section" id="cta-section">
      <div class="price-row">
        <span class="price-old">R$ 97</span>
        <span class="price-new">R$ 37</span>
      </div>
      <a
        href="https://www.asaas.com/c/fpfzv27dp5mstjyr"
        class="btn-cta"
        target="_blank"
        rel="noopener noreferrer"
      >
        Fazer Inscrição
      </a>
    </div>

  </div>

  <script>
    let videoDuration = 0;
    let videoCurrentTime = 0;
    let unlocked = false;

    const ctaSection = document.getElementById('cta-section');

    function showCta() {
      if (unlocked) return;
      unlocked = true;
      ctaSection.classList.add('visible');
    }

    function checkPercentage() {
      if (videoDuration > 0 && videoCurrentTime > 0) {
        const pct = (videoCurrentTime / videoDuration) * 100;
        if (pct >= 10) showCta();
      }
    }

    /* ── Método 1: PandaVideo JS API oficial ── */
    function initPandaPlayer() {
      if (typeof PandaPlayer === 'undefined') return;

      const player = new PandaPlayer('panda-video', {
        onReady: function () {
          player.onEvent(function (event) {
            if (!event || !event.message) return;

            // Duração do vídeo
            if (event.message === 'pandaPlayerDuration') {
              videoDuration = event.videoCurrentTime || 0;
            }

            // Progresso do vídeo
            if (event.message === 'pandaPlayerTimeUpdate' && !unlocked) {
              videoCurrentTime = event.videoCurrentTime || 0;
              checkPercentage();
            }
          });
        }
      });
    }

    /* ── Método 2: postMessage (fallback universal) ── */
    window.addEventListener('message', function (e) {
      if (unlocked) return;
      try {
        const data = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
        if (!data) return;

        // Formato A: { currentTime, duration }
        if (data.currentTime !== undefined && data.duration) {
          videoCurrentTime = parseFloat(data.currentTime);
          videoDuration    = parseFloat(data.duration);
          checkPercentage();
        }
        // Formato B: { videoCurrentTime } com duration já conhecida
        if (data.videoCurrentTime !== undefined) {
          videoCurrentTime = parseFloat(data.videoCurrentTime);
          checkPercentage();
        }
        // Formato C: evento genérico timeupdate
        if (data.event === 'timeupdate' && data.seconds !== undefined) {
          videoCurrentTime = parseFloat(data.seconds);
          if (data.duration) videoDuration = parseFloat(data.duration);
          checkPercentage();
        }
      } catch (_) {}
    });

    /* ── Carrega o SDK e inicializa ── */
    (function loadSdk() {
      const s = document.createElement('script');
      s.src = 'https://player.pandavideo.com.br/api.v2.js';
      s.onload  = initPandaPlayer;
      s.onerror = function () { /* SDK não carregou, postMessage cobre */ };
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
