<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campanha de Inverno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- SDK oficial do Pandavideo (async obrigatório) -->
  <script async src="https://player.pandavideo.com.br/api.v2.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: #141414;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 80px;
    }

    .headline {
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 900;
      color: #fff;
      text-align: center;
      line-height: 1.1;
      letter-spacing: -0.02em;
      max-width: 760px;
    }

    .subtitle {
      margin-top: 16px;
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      color: #888;
      text-align: center;
      max-width: 580px;
      line-height: 1.6;
    }

    .video-wrap {
      margin-top: 40px;
      width: 100%;
      max-width: 860px;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.7);
    }

    .video-wrap iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border: none;
    }

    /* CTA oculto no início */
    .cta-section {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      opacity: 0;
      transform: translateY(28px);
      pointer-events: none;
      transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .cta-section.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .price-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .price-old {
      font-size: clamp(1.2rem, 3vw, 1.7rem);
      font-weight: 700;
      color: #555;
      text-decoration: line-through;
    }

    .price-new {
      font-size: clamp(2rem, 5.5vw, 3.2rem);
      font-weight: 900;
      color: #b8f500;
      letter-spacing: -0.02em;
    }

    .btn-cta {
      display: inline-block;
      background: #b8f500;
      color: #0a0a0a;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 18px 52px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(184, 245, 0, 0.25);
      transition: background 0.18s ease, transform 0.12s ease, box-shadow 0.18s ease;
    }

    .btn-cta:hover {
      background: #cbff1a;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(184, 245, 0, 0.35);
    }

    .btn-cta:active {
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      .page { padding: 40px 16px 60px; }
      .btn-cta { padding: 16px 36px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="page">

    <h1 class="headline">Campanha de Inverno</h1>
    <p class="subtitle">A melhor estratégia para matricular novos alunos no seu negócio fitness agora em julho.</p>

    <div class="video-wrap">
      <iframe
        id="panda-video"
        src="https://player-vz-d0abe256-8c2.tv.pandavideo.com/embed/?v=59ebcfcb-025a-4473-8a0c-a68b140c3a79"
        style="border:none;"
        allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture"
        allowfullscreen
        fetchpriority="high"
      ></iframe>
    </div>

    <div class="cta-section" id="cta-section">
      <div class="price-row">
        <span class="price-old">R$ 97</span>
        <span class="price-new">R$ 37</span>
      </div>
      <a
        href="https://www.asaas.com/c/fpfzv27dp5mstjyr"
        class="btn-cta"
        target="_blank"
        rel="noopener noreferrer"
      >
        Fazer Inscrição
      </a>
    </div>

  </div>

  <script>
    let videoDuration = 0;
    let unlocked = false;
    const ctaSection = document.getElementById('cta-section');

    function showCta() {
      if (unlocked) return;
      unlocked = true;
      ctaSection.classList.add('visible');
    }

    // ── Método 1: SDK oficial do Pandavideo ──────────────────────────────
    // window.pandascripttag é o padrão correto (executa após o async carregar)
    window.pandascripttag = window.pandascripttag || [];
    window.pandascripttag.push(function () {
      const player = new PandaPlayer('panda-video', {
        onReady: function () {

          // Pega a duração total via getDuration() (método oficial da API)
          videoDuration = player.getDuration() || 0;

          player.onEvent(function (e) {
            // Se ainda não tiver a duração, tenta de novo
            if (!videoDuration || isNaN(videoDuration)) {
              videoDuration = player.getDuration() || 0;
            }

            // Evento correto: panda_timeupdate | propriedade correta: e.currentTime
            if (e.message === 'panda_timeupdate' && !unlocked && videoDuration > 0) {
              const pct = (e.currentTime / videoDuration) * 100;
              if (pct >= 10) showCta();
            }
          });
        },

        onError: function (err) {
          console.warn('PandaPlayer erro:', err);
        }
      });
    });

    // ── Método 2: postMessage (fallback, caso o SDK não carregue) ────────
    // Formato oficial: event.data = { message, currentTime, video }
    window.addEventListener('message', function (event) {
      if (unlocked) return;
      try {
        const data = event.data;
        if (!data || typeof data !== 'object') return;

        if (data.message === 'panda_timeupdate' && typeof data.currentTime === 'number') {
          // Se o SDK já carregou e temos a duração, usa a porcentagem
          if (videoDuration > 0) {
            if ((data.currentTime / videoDuration) * 100 >= 10) showCta();
          }
        }
      } catch (_) {}
    }, false);
  </script>
</body>
</html>
